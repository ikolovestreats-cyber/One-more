<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>one more</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --text: #1A1916;
    --muted: #9B9890;
    --accent: #5C4BCC;
    --accent-light: #EEEDFE;
    --accent-muted: #A99EE8;
    --success: #2D9C6B;
    --radius: 12px;
    --radius-sm: 8px;
    /* weight colors */
    --heavy: #C84B31;
    --heavy-bg: #FDF0ED;
    --medium: #B07D2A;
    --medium-bg: #FDF5E6;
    --light: #9B9890;
    --light-bg: #F7F6F3;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.25rem 4rem;
  }

  .app { max-width: 440px; margin: 0 auto; }

  /* SIGN-IN GATE */
  .signin-gate { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .signin-gate.hidden { display: none; }
  .signin-card { background: #fff; border-radius: 16px; padding: 40px 32px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); border: 1px solid var(--border); }
  .signin-icon { font-size: 32px; margin-bottom: 12px; color: var(--accent); }
  .signin-title { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 300; letter-spacing: 0.12em; text-transform: lowercase; color: var(--text); margin-bottom: 8px; }
  .signin-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; font-weight: 300; }
  .signin-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.15s; }
  .signin-btn:hover { border-color: var(--accent-muted); background: var(--accent-light); }
  .signin-loading { display: none; margin-top: 16px; font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .signin-loading.show { display: block; }
  .signin-error { display: none; margin-top: 12px; padding: 10px 14px; border-radius: 8px; background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; font-size: 12px; }
  .signin-error.show { display: block; }

  /* HEADER */
  .header { margin-bottom: 2.5rem; }
  .wordmark { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 300; color: var(--muted); letter-spacing: 0.12em; text-transform: lowercase; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .title { font-size: 28px; font-weight: 300; line-height: 1.2; letter-spacing: -0.5px; color: var(--text); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; font-weight: 300; }

  /* BACKUP BUTTONS */
  .backup-row { display: flex; gap: 6px; }
  .backup-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: none;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .backup-btn:hover { border-color: var(--accent-muted); color: var(--accent); background: var(--accent-light); }

  /* SYNC */
  .sync-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: none;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .sync-btn:hover { border-color: var(--accent-muted); color: var(--accent); background: var(--accent-light); }
  .sync-btn.connected { border-color: var(--success); color: var(--success); }
  .sync-status {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    letter-spacing: 0.06em; display: flex; align-items: center; gap: 4px;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.saving { background: var(--medium); }
  .sync-dot.error { background: var(--heavy); }

  /* COUNTERS */
  .counters { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 2rem; }
  .counter { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 12px; }
  .counter .num { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 400; color: var(--text); line-height: 1; }
  .counter .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 400; }

  /* SECTION */
  .section { margin-bottom: 1.75rem; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 400; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }

  /* WEIGHT LEGEND */
  .weight-legend { display: flex; gap: 10px; align-items: center; }
  .wdot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 3px; }
  .wdot.heavy { background: var(--heavy); }
  .wdot.medium { background: var(--medium); }
  .wdot.light { background: var(--border); }
  .wleg { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); display: flex; align-items: center; }

  /* TASK LIST */
  .task-list { display: flex; flex-direction: column; gap: 5px; }
  .task-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.2s;
    user-select: none;
    position: relative;
  }
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  }
  .task-item.weight-heavy::before { background: var(--heavy); }
  .task-item.weight-medium::before { background: var(--medium); }
  .task-item.weight-light::before { background: transparent; }
  .task-item:hover { border-color: var(--accent-muted); }
  .task-item.done { opacity: 0.38; cursor: default; }
  .task-item.done:hover { border-color: var(--border); }
  .task-item.done .task-name { text-decoration: line-through; }

  .circle {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .task-item.done .circle { background: var(--success); border-color: var(--success); }
  .check-icon { display: none; width: 10px; height: 10px; }
  .task-item.done .check-icon { display: block; }

  .task-name { font-size: 14px; font-weight: 400; color: var(--text); flex: 1; }
  .task-weight-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 2px 7px; border-radius: 99px; flex-shrink: 0;
  }
  .task-weight-label.heavy { background: var(--heavy-bg); color: var(--heavy); }
  .task-weight-label.medium { background: var(--medium-bg); color: var(--medium); }
  .task-weight-label.light { display: none; }

  .remove-btn {
    width: 22px; height: 22px; border-radius: 50%; border: none; background: none;
    color: var(--muted); font-size: 16px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
  }
  .edit-btn {
    width: 22px; height: 22px; border-radius: 50%; border: none; background: none;
    color: var(--muted); font-size: 13px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
  }
  .task-item:hover .remove-btn,
  .task-item:hover .edit-btn { opacity: 1; }
  .task-item.done .remove-btn { display: none; }
  .task-item.done .edit-btn { display: none; }
  .task-edit-input {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--surface); border: 1px solid var(--accent-muted);
    border-radius: 6px; padding: 2px 8px; color: var(--text); outline: none;
  }
  /* TIMER WIDGET */
  .timer-widget {
    position: fixed; bottom: 24px; right: 20px; z-index: 100;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 18px; box-shadow: 0 4px 20px rgba(0,0,0,.1);
    min-width: 220px; display: none;
  }
  .timer-widget.open { display: block; }
  .timer-task-name { font-size: 11px; color: var(--muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .timer-display { font-family: 'DM Mono', monospace; font-size: 30px; font-weight: 300; color: var(--text); letter-spacing: 2px; text-align: center; margin-bottom: 10px; }
  .timer-display.warning { color: #B91C1C; }
  .timer-mode-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .timer-mode-btn { flex: 1; padding: 5px; border: 1px solid var(--border); border-radius: 8px; background: none; font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); cursor: pointer; transition: all .15s; }
  .timer-mode-btn.active { border-color: var(--accent-muted); background: var(--accent-light); color: var(--accent); }
  .timer-controls { display: flex; gap: 6px; }
  .timer-btn { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: 8px; background: none; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: .06em; }
  .timer-btn.start { border-color: var(--accent-muted); background: var(--accent-light); color: var(--accent); }
  .timer-btn.start:hover { background: var(--accent); color: #fff; }
  .timer-btn:hover { border-color: var(--accent-muted); color: var(--accent); }
  .timer-close { position: absolute; top: 8px; right: 10px; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .timer-duration-row { display: flex; gap: 4px; margin-bottom: 10px; }
  .timer-dur-btn { flex: 1; padding: 4px; border: 1px solid var(--border); border-radius: 6px; background: none; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); cursor: pointer; transition: all .15s; }
  .timer-dur-btn.active { border-color: var(--accent-muted); background: var(--accent-light); color: var(--accent); }
  .timer-start-btn { width: 22px; height: 22px; border-radius: 50%; border: none; background: none; color: var(--muted); font-size: 13px; cursor: pointer; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
  .task-item:hover .timer-start-btn { opacity: 1; }
  @keyframes timerFlash { 0%,100%{background:transparent} 50%{background:#FEE2E2} }
  .timer-widget.done { animation: timerFlash 0.6s ease-in-out infinite; }

  /* ADD ROW */
  .add-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-row input {
    flex: 1; height: 38px; padding: 0 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .add-row input:focus { border-color: var(--accent); }
  .add-row input::placeholder { color: var(--muted); }

  .weight-select {
    height: 38px; padding: 0 8px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); outline: none;
    cursor: pointer; transition: border-color 0.15s;
    -webkit-appearance: none; appearance: none;
    min-width: 72px; text-align: center;
  }
  .weight-select:focus { border-color: var(--accent); }

  .add-row button {
    height: 38px; padding: 0 16px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-row button:hover { opacity: 0.88; }

  /* REWARDS */
  .reward-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent-light); border-radius: 999px;
    padding: 5px 12px; font-size: 13px; color: var(--accent);
  }
  .pill button {
    background: none; border: none; color: var(--accent-muted);
    font-size: 15px; line-height: 1; cursor: pointer; padding: 0;
  }
  .pill button:hover { color: var(--accent); }

  .drag-handle {
    display: flex; flex-direction: column; gap: 3px;
    padding: 2px 2px; cursor: grab; flex-shrink: 0; opacity: 0.3;
    transition: opacity 0.15s;
  }
  .task-item:hover .drag-handle { opacity: 0.7; }
  .drag-handle span { display: block; width: 14px; height: 1.5px; background: var(--text); border-radius: 2px; }
  .task-item.done .drag-handle { display: none; }
  .task-item.dragging { opacity: 0.4; border: 1px dashed var(--accent-muted); }
  .task-item.drag-over { border-color: var(--accent); }

  /* OVERLAY */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26, 25, 22, 0.6);
    align-items: center; justify-content: center;
    z-index: 100; padding: 1.5rem;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; }

  .reveal-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 320px; width: 100%;
    border: 1px solid var(--border);
    animation: pop 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { transform: scale(0.88); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .reward-emoji { font-size: 40px; margin-bottom: 1rem; }
  .reward-eyebrow {
    font-family: 'DM Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 10px;
  }
  .reward-name { font-size: 22px; font-weight: 400; color: var(--text); letter-spacing: -0.3px; margin-bottom: 2rem; }
  .dismiss-btn {
    padding: 10px 28px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .dismiss-btn:hover { background: var(--bg); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }

  .clear-btn {
    background: none; border: none; font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); cursor: pointer; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 0; text-decoration: underline;
    text-underline-offset: 3px;
  }
  .clear-btn:hover { color: var(--text); }

  .reset-row { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: center; }
  .reset-btn {
    background: none; border: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); cursor: pointer; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 8px 20px; border-radius: var(--radius-sm);
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: #E05C5C; color: #E05C5C; }

  /* CONFIRM OVERLAY */
  .confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,25,22,0.6);
    align-items: center; justify-content: center;
    z-index: 200; padding: 1.5rem;
    backdrop-filter: blur(4px);
  }
  .confirm-overlay.show { display: flex; }
  .confirm-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 2rem; text-align: center; max-width: 280px; width: 100%;
    border: 1px solid var(--border);
    animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .confirm-card p { font-size: 15px; color: var(--text); margin-bottom: 6px; }
  .confirm-card small { font-size: 12px; color: var(--muted); }
  .confirm-actions { display: flex; gap: 8px; margin-top: 1.5rem; }
  .confirm-actions button { flex: 1; height: 38px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-cancel:hover { background: var(--bg); }
  .btn-confirm { background: #E05C5C; border: none; color: #fff; }
  .btn-confirm:hover { opacity: 0.88; }

  .rw-btn-row { display: flex; gap: 6px; margin-top: 8px; }
  .rw-btn-row button {
    flex: 1; height: 32px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    transition: all .15s;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: #fff;
    padding: 9px 18px; border-radius: 99px;
    font-size: 12px; font-family: 'DM Mono', monospace;
    z-index: 300; transition: transform 0.3s;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* TABS */
  .tab-nav { display: flex; gap: 4px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .tab-btn {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 8px 14px 10px; border: none; background: none;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  /* CLARITY TAB */
  .clarity-list .empty { font-size: 13px; color: var(--muted); font-weight: 300; padding: 4px 0 12px; }

  .clarity-event-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
  }
  .clarity-event-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; }
  .clarity-event-header-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .clarity-event-chevron { display: inline-block; flex-shrink: 0; transition: transform 0.2s; font-style: normal; color: var(--muted); }
  .clarity-event-name { font-size: 16px; font-weight: 500; color: var(--text); word-break: break-word; }
  .clarity-event-acts { display: flex; gap: 2px; flex-shrink: 0; }
  .clarity-event-card.collapsed .clarity-event-header { margin-bottom: 0; }
  .clarity-event-card:not(.collapsed) .clarity-event-header { margin-bottom: 14px; }

  .clarity-cats-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 20px; row-gap: 16px; }
  @media(max-width:640px){
    .clarity-cats-grid { grid-template-columns: 1fr; }
  }
  .clarity-cat { margin-bottom: 0; }
  .clarity-cat-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .clarity-cat-label.within { color: var(--accent); }
  .clarity-cat-label.outside { color: #4A7C59; }
  .clarity-cat-label.planb { color: var(--medium); }
  .clarity-cat-label.observation { color: #4A6C99; }

  .add-row.mini { margin-top: 0; margin-bottom: 8px; gap: 5px; }
  .add-row.mini input { height: 32px; font-size: 13px; }
  .add-row.mini button { height: 32px; padding: 0 12px; font-size: 12px; }

  .clarity-item { display: flex; align-items: flex-start; gap: 8px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; background: var(--accent-light); border-color: var(--accent-muted); }
  .clarity-cat.outside .clarity-item { background: #F4FAF6; border-color: #C8DFD0; }
  .clarity-cat.outside .clarity-item-text { color: #3D6B4F; }
  .clarity-cat.planb .clarity-item { background: var(--medium-bg); border-color: #E4C68A; }
  .clarity-cat.planb .clarity-item-text { color: var(--medium); }
  .clarity-cat.observation .clarity-item { background: #F0F5FA; border-color: #C6D8E8; }
  .clarity-cat.observation .clarity-item-text { color: #3E5C7A; }
  .clarity-item-text { flex: 1; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .clarity-item-acts { display: flex; gap: 4px; flex-shrink: 0; }

<script>
// ── Weight reward probabilities ────────────────────────
const DROUGHT_THRESHOLD = 7;
const DROUGHT_BOOST = 0.3 + Math.random() * 0.2;

function getProb(weight) {
  // base ranges shuffle on every session so no fixed pattern exists
  const seed = (Date.now() % 1000) / 1000;
  const ranges = {
    heavy:  [0.42 + seed * 0.08,  0.68 + seed * 0.06],
    medium: [0.18 + seed * 0.06,  0.34 + seed * 0.08],
    light:  [0.02 + seed * 0.03,  0.09 + seed * 0.04]
  };
  const [lo, hi] = ranges[weight] || ranges.light;
  return lo + Math.random() * (hi - lo);
}

let state = {
  tasks: [],
  rewards: [],
  rewardMap: {},
  doneToday: 0,
  rewardsEarned: 0,
  tasksSinceLast: 0,
  lastReset: new Date().toDateString(),
  clarityEvents: [],
  experiments: [],
  literatureNotes: []
};

function _save() {
  localStorage.setItem('onemore_state', JSON.stringify(state));
}

function save() {
  _save();
  saveToDrive();
}

function load() {
  try {
    const raw = localStorage.getItem('onemore_state');
    if (raw) {
      const saved = JSON.parse(raw);
      state = { ...state, ...saved };
      if (!state.clarityEvents) state.clarityEvents = [];
      if (!state.experiments) state.experiments = [];
      if (!state.literatureNotes) state.literatureNotes = [];
      // old schema fields no longer supported — drop them
      delete state.constraints;
      delete state.constraintArchive;
      delete state.clarityWithin;
      delete state.clarityOutside;
      delete state.clarityOutsideArchive;
      if (state.lastReset !== new Date().toDateString()) {
        state.doneToday = 0;
        state.lastReset = new Date().toDateString();
      }
    }
  } catch(e) {}
}

// ── Reward logic ───────────────────────────────────────
function roll(weight) {
  const base = getProb(weight);
  const boost = state.tasksSinceLast >= DROUGHT_THRESHOLD ? DROUGHT_BOOST : 0;
  return Math.random() < (base + boost);
}

function assignRewardToTask(taskId, weight) {
  if (state.rewards.length === 0) return false;
  if (!roll(weight)) return false;
  // match reward tier to task weight — heavy task gets heavy reward
  const matching = state.rewards.filter(r => r.weight === weight);
  const fallback = state.rewards; // use any reward if no matching tier exists yet
  const pool = matching.length > 0 ? matching : fallback;
  const r = pool[Math.floor(Math.random() * pool.length)];
  state.rewardMap[taskId] = r.text || r; // handle old string format
  return true;
}

// ── Clarity ────────────────────────────────────────────
const CLARITY_CATS = ['within', 'outside', 'planb', 'observation'];
const CLARITY_CAT_LABELS = { within: 'within my control', outside: 'outside my control', planb: 'plan b', observation: 'observation' };
let clarityCollapsed = new Set();

let _idCounter = 0;
function newId() { _idCounter++; return String(Date.now()) + '-' + _idCounter + '-' + String(Math.random()).slice(2,7); }

function addClarityEvent() {
  const input = document.getElementById('clarity-event-input');
  const val = input.value.trim();
  if (!val) return;
  state.clarityEvents.push({
    id: newId(), name: val, archived: false,
    within: [], outside: [], planb: [], observation: []
  });
  input.value = '';
  save(); renderClarity();
}

function removeClarityEvent(id) {
  state.clarityEvents = state.clarityEvents.filter(e => String(e.id) !== String(id));
  save(); renderClarity();
}

function archiveClarityEvent(id) {
  const ev = state.clarityEvents.find(e => String(e.id) === String(id));
  if (!ev) return;
  ev.archived = true;
  save(); renderClarity();
}

function unarchiveClarityEvent(id) {
  const ev = state.clarityEvents.find(e => String(e.id) === String(id));
  if (!ev) return;
  ev.archived = false;
  save(); renderClarity();
}

function toggleClarityEventCollapse(id) {
  if (clarityCollapsed.has(id)) clarityCollapsed.delete(id);
  else clarityCollapsed.add(id);
  renderClarity();
}

function addClarityItem(eventId, cat) {
  const ev = state.clarityEvents.find(e => String(e.id) === String(eventId));
  if (!ev) return;
  const input = document.getElementById('ci-input-' + eventId + '-' + cat);
  const val = input.value.trim();
  if (!val) return;
  ev[cat].push({ id: newId(), text: val });
  input.value = '';
  save(); renderClarity();
}

function removeClarityItem(eventId, cat, itemId) {
  const ev = state.clarityEvents.find(e => String(e.id) === String(eventId));
  if (!ev) return;
  ev[cat] = ev[cat].filter(c => String(c.id) !== String(itemId));
  save(); renderClarity();
}

function toggleClarityArchive() {
  const sec = document.getElementById('clarity-archive-section');
  const toggle = document.getElementById('clarity-archive-toggle');
  const chevron = toggle.querySelector('.chevron');
  const isOpen = sec.style.display !== 'none';
  sec.style.display = isOpen ? 'none' : 'block';
  chevron.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function showWeightPicker(id) {
  const wp = document.getElementById('ci-wp-' + id);
  if (wp) wp.style.display = 'flex';
  const acts = document.getElementById('ci-acts-' + id);
  if (acts) acts.style.display = 'none';
}
function hideWeightPicker(id) {
  const wp = document.getElementById('ci-wp-' + id);
  if (wp) wp.style.display = 'none';
  const acts = document.getElementById('ci-acts-' + id);
  if (acts) acts.style.display = 'flex';
}

function promoteClarityItem(eventId, itemId, weight) {
  const ev = state.clarityEvents.find(e => String(e.id) === String(eventId));
  if (!ev) return;
  const item = ev.within.find(c => String(c.id) === String(itemId));
  if (!item) return;
  const w = ['light','medium','heavy'].includes(weight) ? weight : 'medium';
  const taskId = Date.now() + Math.random();
  state.tasks.push({ id: taskId, name: item.text, done: false, weight: w });
  assignRewardToTask(taskId, w);
  ev.within = ev.within.filter(c => String(c.id) !== String(itemId));
  save(); render(); renderClarity();
  switchTab('tasks');
}

function clarityItemTpl(ev, cat, item) {
  if (cat === 'within') {
    return `
      <div class="clarity-item" id="ci-${item.id}">
        <div class="clarity-item-text">${escHtml(item.text)}</div>
        <div class="clarity-item-acts" id="ci-acts-${item.id}">
          <button class="clarity-promote-btn" onclick="showWeightPicker('${item.id}')">→ task</button>
          <button class="clarity-remove-btn" onclick="removeClarityItem('${ev.id}','within','${item.id}')" aria-label="remove">×</button>
        </div>
        <div class="clarity-weight-picker" id="ci-wp-${item.id}" style="display:none">
          <button class="timer-dur-btn" onclick="promoteClarityItem('${ev.id}','${item.id}','light')">light</button>
          <button class="timer-dur-btn" onclick="promoteClarityItem('${ev.id}','${item.id}','medium')">medium</button>
          <button class="timer-dur-btn" onclick="promoteClarityItem('${ev.id}','${item.id}','heavy')">heavy</button>
          <button class="clarity-remove-btn" onclick="hideWeightPicker('${item.id}')" style="margin-left:4px">×</button>
        </div>
      </div>`;
  }
  return `
    <div class="clarity-item">
      <div class="clarity-item-text">${escHtml(item.text)}</div>
      <div class="clarity-item-acts">
        <button class="clarity-remove-btn" onclick="removeClarityItem('${ev.id}','${cat}','${item.id}')" aria-label="remove">×</button>
      </div>
    </div>`;
}

function clarityEventCardTpl(ev) {
  const collapsed = clarityCollapsed.has(ev.id);
  const cats = CLARITY_CATS.map(cat => `
    <div class="clarity-cat ${cat}">
      <div class="clarity-cat-label ${cat}">${CLARITY_CAT_LABELS[cat]}</div>
      <div class="add-row mini">
        <input type="text" id="ci-input-${ev.id}-${cat}" placeholder=""
          onclick="event.stopPropagation()"
          onkeydown="if(event.key==='Enter')addClarityItem('${ev.id}','${cat}')" />
        <button onclick="event.stopPropagation();addClarityItem('${ev.id}','${cat}')">add</button>
      </div>
      <div class="clarity-list" onclick="event.stopPropagation()">
        ${ev[cat].length ? ev[cat].map(item => clarityItemTpl(ev, cat, item)).join('') : '<div class="empty">nothing here right now</div>'}
      </div>
    </div>`).join('');

  return `
    <div class="clarity-event-card ${collapsed ? 'collapsed' : ''}" data-id="${ev.id}">
      <div class="clarity-event-header" onclick="toggleClarityEventCollapse('${ev.id}')">
        <div class="clarity-event-header-left">
          <em class="clarity-event-chevron" style="transform:rotate(${collapsed ? '0' : '90'}deg)">›</em>
          <span class="clarity-event-name">${escHtml(ev.name)}</span>
        </div>
        <div class="clarity-event-acts">
          <button class="c-btn" onclick="event.stopPropagation();archiveClarityEvent('${ev.id}')" title="archive">↓</button>
          <button class="c-btn" onclick="event.stopPropagation();removeClarityEvent('${ev.id}')" title="delete" style="color:#B91C1C">×</button>
        </div>
      </div>
      ${collapsed ? '' : `<div class="clarity-cats-grid">${cats}</div>`}
    </div>`;
}

function renderClarity() {
  const list = document.getElementById('clarity-events-list');

// ── Experiments ─────────────────────────────────────────
let experimentsCollapsed = new Set();

function addExperiment() {
  const input = document.getElementById('experiment-input');
  const val = input.value.trim();
  if (!val) return;
  state.experiments.push({
    id: newId(), name: val, archived: false, status: 'pending',
    issues: [], worked: [], links: [], nextStep: ''
  });
  input.value = '';
  save(); renderExperiments();
}

function removeExperiment(id) {
  state.experiments = state.experiments.filter(e => String(e.id) !== String(id));
  save(); renderExperiments();
}

function archiveExperiment(id) {
  const exp = state.experiments.find(e => String(e.id) === String(id));
  if (!exp) return;
  exp.archived = true;
  save(); renderExperiments();
}

function unarchiveExperiment(id) {
  const exp = state.experiments.find(e => String(e.id) === String(id));
  if (!exp) return;
  exp.archived = false;
  save(); renderExperiments();
}

function toggleExperimentCollapse(id) {
  if (experimentsCollapsed.has(id)) experimentsCollapsed.delete(id);
  else experimentsCollapsed.add(id);
  renderExperiments();
}

function addExperimentItem(expId, listName) {
  const exp = state.experiments.find(e => String(e.id) === String(expId));
  if (!exp) return;
  if (!exp[listName]) exp[listName] = [];
  const input = document.getElementById('exp-input-' + expId + '-' + listName);
  const val = input.value.trim();
  if (!val) return;
  exp[listName].push({ id: newId(), text: val });
  input.value = '';
  save(); renderExperiments();
}

function removeExperimentItem(expId, listName, itemId) {
  const exp = state.experiments.find(e => String(e.id) === String(expId));
  if (!exp) return;
  exp[listName] = exp[listName].filter(i => String(i.id) !== String(itemId));
  save(); renderExperiments();
}

function setExperimentStatus(expId, status) {
  const exp = state.experiments.find(e => String(e.id) === String(expId));
  if (!exp) return;
  exp.status = status;
  save(); renderExperiments();
}

function saveNextStep(expId) {
  const exp = state.experiments.find(e => String(e.id) === String(expId));
  if (!exp) return;
  const inp = document.getElementById('exp-next-' + expId);
  if (inp) exp.nextStep = inp.value;
  save();
}

function promoteNextStep(expId) {
  const exp = state.experiments.find(e => String(e.id) === String(expId));
  if (!exp || !exp.nextStep || !exp.nextStep.trim()) return;
  state.experiments.push({
    id: newId(), name: exp.nextStep.trim(), archived: false, status: 'pending',
    issues: [], worked: [], links: [], nextStep: ''
  });
  save(); renderExperiments();
  showToast('new experiment started');
}

function toggleExperimentsArchive() {
  const sec = document.getElementById('experiments-archive-section');
  const toggle = document.getElementById('experiments-archive-toggle');
  const chevron = toggle.querySelector('.chevron');
  const isOpen = sec.style.display !== 'none';
  sec.style.display = isOpen ? 'none' : 'block';
  chevron.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function experimentItemTpl(exp, listName, item) {
  const content = listName === 'links'
    ? `<a href="${escHtml(item.text)}" target="_blank" rel="noopener" class="clarity-item-link">${escHtml(item.text)}</a>`
    : escHtml(item.text);
  return `
    <div class="clarity-item">
      <div class="clarity-item-text">${content}</div>
      <div class="clarity-item-acts">
        <button class="clarity-remove-btn" onclick="removeExperimentItem('${exp.id}','${listName}','${item.id}')" aria-label="remove">×</button>
      </div>
    </div>`;
}

function experimentCardTpl(exp) {
  const collapsed = experimentsCollapsed.has(exp.id);
  const listsHtml = ['issues','worked','links'].map(listName => `
    <div class="clarity-cat ${listName}">
      <div class="clarity-cat-label ${listName}">${listName === 'issues' ? 'issues' : listName === 'worked' ? 'what worked' : 'links'}</div>
      <div class="add-row mini">
        <input type="text" id="exp-input-${exp.id}-${listName}" placeholder="${listName === 'links' ? 'paste a link…' : ''}"
          onclick="event.stopPropagation()"
          onkeydown="if(event.key==='Enter')addExperimentItem('${exp.id}','${listName}')" />
        <button onclick="event.stopPropagation();addExperimentItem('${exp.id}','${listName}')">add</button>
      </div>
      <div class="clarity-list" onclick="event.stopPropagation()">
        ${(exp[listName]||[]).length ? (exp[listName]||[]).map(item => experimentItemTpl(exp, listName, item)).join('') : '<div class="empty">nothing here right now</div>'}
      </div>
    </div>`).join('');

  return `
    <div class="clarity-event-card ${collapsed ? 'collapsed' : ''}" data-id="${exp.id}">
      <div class="clarity-event-header" onclick="toggleExperimentCollapse('${exp.id}')">
        <div class="clarity-event-header-left">
          <em class="clarity-event-chevron" style="transform:rotate(${collapsed ? '0' : '90'}deg)">›</em>
          <span class="clarity-event-name">${escHtml(exp.name)}</span>
          <span class="exp-status-badge ${exp.status}">${exp.status}</span>
        </div>
        <div class="clarity-event-acts">
          <button class="c-btn" onclick="event.stopPropagation();archiveExperiment('${exp.id}')" title="archive">↓</button>
          <button class="c-btn" onclick="event.stopPropagation();removeExperiment('${exp.id}')" title="delete" style="color:#B91C1C">×</button>
        </div>
      </div>
      ${collapsed ? '' : `
      <div class="clarity-cats-grid">${listsHtml}</div>
      <div class="clarity-cat" style="margin-top:16px" onclick="event.stopPropagation()">
        <div class="clarity-cat-label" style="color:var(--muted)">status</div>
        <div class="exp-status-row">
          <button class="${exp.status==='pending'?'active-pending':''}" onclick="setExperimentStatus('${exp.id}','pending')">pending</button>
          <button class="${exp.status==='approved'?'active-approved':''}" onclick="setExperimentStatus('${exp.id}','approved')">approved</button>
          <button class="${exp.status==='rejected'?'active-rejected':''}" onclick="setExperimentStatus('${exp.id}','rejected')">rejected</button>
        </div>
      </div>
      <div class="clarity-cat" style="margin-top:16px" onclick="event.stopPropagation()">
        <div class="clarity-cat-label" style="color:var(--accent)">next step</div>
        <div class="add-row mini">
          <input type="text" id="exp-next-${exp.id}" placeholder="what's next…" value="${escHtml(exp.nextStep || '')}"
            onchange="saveNextStep('${exp.id}')"
            onkeydown="if(event.key==='Enter'){saveNextStep('${exp.id}');promoteNextStep('${exp.id}')}" />
          <button onclick="saveNextStep('${exp.id}');promoteNextStep('${exp.id}')">→ new experiment</button>
        </div>
      </div>`}
    </div>`;
}

function renderExperiments() {
  const list = document.getElementById('experiments-list');
  const active = state.experiments.filter(e => !e.archived);
  list.innerHTML = active.length
    ? active.map(experimentCardTpl).join('')

function addTask() {
  const input = document.getElementById('task-input');
  const weightEl = document.getElementById('weight-select');
  const val = input.value.trim();
  if (!val) return;
  const id = Date.now() + Math.random();
  const weight = weightEl.value;
  state.tasks.push({ id, name: val, done: false, weight });
  const rewarded = assignRewardToTask(id, weight);
  if (rewarded) state.tasksSinceLast = 0;
  input.value = '';
  save(); render();
}

function completeTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task || task.done) return;
  task.done = true;
  state.doneToday++;
  state.tasksSinceLast++;

  const reward = state.rewardMap[id];
  if (reward) {
    state.rewardsEarned++;
    state.tasksSinceLast = 0;
    save(); render();
    setTimeout(() => showReveal(reward), 180);
  } else {
    save(); render();
  }
}

function removeTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  delete state.rewardMap[id];
  save(); render();
}

function clearDone() {
  const doneIds = state.tasks.filter(t => t.done).map(t => t.id);
  doneIds.forEach(id => delete state.rewardMap[id]);
  state.tasks = state.tasks.filter(t => !t.done);
  save(); render();
}

function addReward() {
  const input = document.getElementById('reward-input');
  const val = input.value.trim();
  if (!val) return;
  state.rewards.push({ text: val, weight: 'heavy' });
  input.value = '';
  save(); render();
}

function removeReward(idx) {
  state.rewards.splice(idx, 1);
  save(); render();
}

// ── Export / Import ────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `onemore-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✓ backup saved');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.tasks || !data.rewards) { showToast('⚠ invalid backup file'); return; }
        state = data;
        save(); render();
        showToast('✓ data restored');
      } catch(err) { showToast('⚠ could not read file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Drag & Drop ────────────────────────────────────────
let dragId = null;

function dragStart(e, id) { dragId = id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function dragDrop(e, targetId) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (dragId === targetId) return;
  const fromIdx = state.tasks.findIndex(t => t.id === dragId);
  const toIdx = state.tasks.findIndex(t => t.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = state.tasks.splice(fromIdx, 1);
  state.tasks.splice(toIdx, 0, moved);
  save(); render();
}
function dragEnd(e) { e.currentTarget.classList.remove('dragging'); dragId = null; }

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Render ─────────────────────────────────────────────
function render() {
  document.getElementById('cnt-done').textContent = state.doneToday;
  document.getElementById('cnt-total').textContent = state.tasks.length;
  document.getElementById('cnt-rewards').textContent = state.rewardsEarned;

  const list = document.getElementById('task-list');
  if (state.tasks.length === 0) {
    list.innerHTML = '<div class="empty">no tasks yet — add one below</div>';
  } else {
    list.innerHTML = state.tasks.map(t => {
      const w = t.weight || 'light';
      if (t.editing) {
        return `<div class="task-item weight-${w}" data-id="${t.id}">
          <div class="drag-handle"><span></span><span></span><span></span></div>
          <input class="task-edit-input" id="tedit-${t.id}" value="${escHtml(t.name)}"
            onkeydown="if(event.key==='Enter')saveTaskEdit(${t.id});if(event.key==='Escape')cancelTaskEdit(${t.id})"
            onclick="event.stopPropagation()" />
          <select class="weight-select" id="tedit-w-${t.id}" onclick="event.stopPropagation()" onchange="event.stopPropagation()" style="height:30px;font-size:12px;">
            <option value="light" ${w==='light'?'selected':''}>light</option>
            <option value="medium" ${w==='medium'?'selected':''}>medium</option>
            <option value="heavy" ${w==='heavy'?'selected':''}>heavy</option>
          </select>
          <button class="c-btn" onclick="event.stopPropagation();saveTaskEdit(${t.id})" style="color:var(--success)">✓</button>
          <button class="c-btn" onclick="event.stopPropagation();cancelTaskEdit(${t.id})">✕</button>
        </div>`;
      }
      return `
      <div class="task-item ${t.done ? 'done' : ''} weight-${w}"
        draggable="${t.done ? 'false' : 'true'}"
        data-id="${t.id}"
        onclick="${t.done ? '' : `completeTask(${t.id})`}"
        ondragstart="dragStart(event, ${t.id})"
        ondragover="dragOver(event)"
        ondragleave="dragLeave(event)"
        ondrop="dragDrop(event, ${t.id})"
        ondragend="dragEnd(event)">
        <div class="drag-handle" onclick="event.stopPropagation()">
          <span></span><span></span><span></span>
        </div>
        <div class="circle">
          <svg class="check-icon" viewBox="0 0 10 10" fill="none">
            <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="task-name">${escHtml(t.name)}</span>
        <span class="task-weight-label ${w}">${w}</span>
        ${!t.done ? `<button class="timer-start-btn" onclick="event.stopPropagation();openTimer(${t.id})" title="start timer">⏱</button>` : ''}
        ${!t.done ? `<button class="edit-btn" onclick="event.stopPropagation(); startTaskEdit(${t.id})" aria-label="edit">✎</button>` : ''}
        <button class="remove-btn" onclick="event.stopPropagation(); removeTask(${t.id})" aria-label="remove">×</button>
      </div>`;
    }).join('');
    // focus edit input if any
    const editing = state.tasks.find(t => t.editing);
    if (editing) {
      const inp = document.getElementById('tedit-' + editing.id);
      if (inp) { inp.focus(); inp.select(); }
    }
  }

  // reward pills
  const rlist = document.getElementById('reward-list');
  if (state.rewards.length === 0) {
    rlist.innerHTML = '<div class="empty">no rewards yet — add what motivates you</div>';
  } else {
    rlist.innerHTML = state.rewards.map((r, i) => {
      const text = r.text || r;
      return `<div class="pill">${escHtml(text)}<button onclick="removeReward(${i})" aria-label="remove reward">×</button></div>`;
    }).join('');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tabs ───────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'clarity') renderClarity();
  if (name === 'experiments') renderExperiments();
  if (name === 'literature') renderLiteratureNotes();
}

// ── Task Editing ───────────────────────────────────────
function startTaskEdit(id) {
  state.tasks.forEach(t => t.editing = false);
  const task = state.tasks.find(t => t.id === id);
  if (task) task.editing = true;
  render();
}
function saveTaskEdit(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  const inp = document.getElementById('tedit-' + id);
  const wSel = document.getElementById('tedit-w-' + id);
  if (inp && inp.value.trim()) task.name = inp.value.trim();
  if (wSel) task.weight = wSel.value;
  task.editing = false;
  save(); render();
}
function cancelTaskEdit(id) {
  const task = state.tasks.find(t => t.id === id);
  if (task) task.editing = false;
  render();
}

// ── Timer ──────────────────────────────────────────────
let timerMode = 'countdown';
let timerDuration = 5 * 60;
let timerRemaining = 5 * 60;
let timerElapsed = 0;
let timerRunning = false;
let timerInterval = null;
let timerTaskId = null;
let timerSoundOn = true;

function toggleTimerSound() {
  timerSoundOn = !timerSoundOn;
  const btn = document.getElementById('timer-sound-toggle');
  btn.textContent = timerSoundOn ? 'on' : 'off';
  btn.style.color = timerSoundOn ? 'var(--accent)' : 'var(--muted)';
  btn.style.background = timerSoundOn ? 'var(--accent-light)' : 'none';
  btn.style.borderColor = timerSoundOn ? 'var(--accent-muted)' : 'var(--border)';
}

function playTimerChime() {
  if (!timerSoundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.18);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.18 + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.18 + 0.35);
      osc.start(ctx.currentTime + i * 0.18);
      osc.stop(ctx.currentTime + i * 0.18 + 0.4);
    });
  } catch(e) {}
}

function fireTimerAlert() {
  const widget = document.getElementById('timer-widget');
  widget.classList.add('done');
  playTimerChime();
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification("time's up!", { body: document.getElementById('timer-task-name').textContent });
  }
}

function dismissTimerAlert() {
  const widget = document.getElementById('timer-widget');
  widget.classList.remove('done');
  document.getElementById('timer-display').classList.remove('warning');
}

function resetTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerRemaining = timerDuration;
  timerElapsed = 0;
  document.getElementById('timer-start-btn').textContent = 'start';
  dismissTimerAlert();
  updateTimerDisplay();
}

function setTimerMode(mode) {
  timerMode = mode;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timer-start-btn').textContent = 'start';
  document.getElementById('timer-mode-countdown').classList.toggle('active', mode === 'countdown');
  document.getElementById('timer-mode-stopwatch').classList.toggle('active', mode === 'stopwatch');
  document.getElementById('timer-duration-row').style.display = mode === 'countdown' ? 'flex' : 'none';
  if (mode === 'countdown') { timerRemaining = timerDuration; }
  else { timerElapsed = 0; }
  updateTimerDisplay();
}

function setDuration(mins) {
  timerDuration = mins * 60;
  timerRemaining = timerDuration;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timer-start-btn').textContent = 'start';
  document.querySelectorAll('.timer-dur-btn').forEach(b => b.classList.toggle('active', b.textContent === mins + 'm'));
  updateTimerDisplay();
}

function toggleTimer() {
  // if showing done state, dismiss
  if (document.getElementById('timer-widget').classList.contains('done')) {
    dismissTimerAlert();
    resetTimer();
    return;
  }
  if (timerRunning) {
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('timer-start-btn').textContent = 'resume';
  } else {
    timerRunning = true;
    document.getElementById('timer-start-btn').textContent = 'pause';
    timerInterval = setInterval(() => {
      if (timerMode === 'countdown') {
        timerRemaining--;
        if (timerRemaining <= 0) {
          timerRemaining = 0;
          timerRunning = false;
          clearInterval(timerInterval);
          document.getElementById('timer-start-btn').textContent = '✓ done';
          document.getElementById('timer-display').classList.add('warning');
          fireTimerAlert();
        }
      } else {
        timerElapsed++;
      }
      updateTimerDisplay();
    }, 1000);
  }
}

function updateTimerDisplay() {
  const secs = timerMode === 'countdown' ? timerRemaining : timerElapsed;
  const m = Math.floor(secs / 60).toString().padStart(2, '0');
  const s = (secs % 60).toString().padStart(2, '0');
  document.getElementById('timer-display').textContent = m + ':' + s;
  if (timerMode === 'countdown' && timerRemaining > 0) document.getElementById('timer-display').classList.remove('warning');
}

function openTimer(taskId) {
  timerTaskId = taskId;
  const task = state.tasks.find(t => t.id === taskId);
  document.getElementById('timer-task-name').textContent = task ? task.name : 'no task selected';
  document.getElementById('timer-widget').classList.add('open');
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function closeTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timer-widget').classList.remove('open');
}

// ── Google Drive Sync ──────────────────────────────────
const CLIENT_ID = '39196568910-li5jfmpbkc6rpekb58kf9pk4icighsa0.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME = 'onemore-data.json';

let driveToken = null;
let driveFileId = null;
let syncTimeout = null;

function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  const btn = document.getElementById('sync-btn');
  dot.className = 'sync-dot ' + (state || '');
  lbl.textContent = label;
  if (state === 'ok') btn.classList.add('connected');
  else btn.classList.remove('connected');
}

function toggleDriveAuth() {
  if (driveToken) {
    driveToken = null;
    driveFileId = null;
    localStorage.removeItem('onemore_drive_token');
    setSyncStatus('', 'not connected');
    showToast('disconnected from drive');
  } else {
    initDriveAuth();
  }
}

function initDriveAuth() {
  setSyncStatus('saving', 'connecting…');
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setSyncStatus('error', 'auth failed'); return; }
      driveToken = resp.access_token;
      localStorage.setItem('onemore_drive_token', driveToken);
      setSyncStatus('saving', 'syncing…');
      await syncFromDrive();
    }
  });
  client.requestAccessToken();
}

async function syncFromDrive() {
  try {
    // find existing file
    const search = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${driveToken}` } }
    );
    const result = await search.json();
    if (result.files && result.files.length > 0) {
      driveFileId = result.files[0].id;
      // load data from Drive
      const fileResp = await fetch(
        `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
        { headers: { Authorization: `Bearer ${driveToken}` } }
      );
      const driveData = await fileResp.json();
      if (driveData && driveData.tasks) {
        state = { ...state, ...driveData };
        if (!state.clarityEvents) state.clarityEvents = [];
        if (!state.experiments) state.experiments = [];
        if (!state.literatureNotes) state.literatureNotes = [];
        delete state.constraints;
        delete state.constraintArchive;
        delete state.clarityWithin;
        delete state.clarityOutside;
        delete state.clarityOutsideArchive;
        _save(); render(); renderClarity();
      }
      setSyncStatus('ok', 'synced');
    } else {
      // no file yet — create one
      setSyncStatus('saving', 'saving…');
      await saveToDrive();
    }
  } catch(e) {
    setSyncStatus('error', 'sync failed');
  }
}

async function saveToDrive() {
  if (!driveToken) return;
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async () => {
    setSyncStatus('saving', 'saving…');
    try {
      const body = JSON.stringify(state);
      if (driveFileId) {
        // update existing
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${driveToken}`, 'Content-Type': 'application/json' },
          body
        });
      } else {
        // create new
        const meta = await fetch('https://www.googleapis.com/drive/v3/files?fields=id', {
          method: 'POST',
          headers: { Authorization: `Bearer ${driveToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: FILE_NAME, parents: ['appDataFolder'] })
        });
        const metaResult = await meta.json();
        driveFileId = metaResult.id;
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${driveToken}`, 'Content-Type': 'application/json' },
          body
        });
      }
      setSyncStatus('ok', 'saved');
    } catch(e) {
      setSyncStatus('error', 'save failed');
    }
  }, 1500); // debounce — wait 1.5s after last change before saving
}

// saveToDrive is called from save() above

// ── Sign-in Gate ───────────────────────────────────────
function startSignIn() {
  document.getElementById('signinLoading').classList.add('show');
  document.getElementById('signinError').classList.remove('show');
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(startSignIn, 300); return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        document.getElementById('signinLoading').classList.remove('show');
        const e = document.getElementById('signinError');
        e.textContent = 'Sign-in failed: ' + resp.error;
        e.classList.add('show');
        return;
      }
      driveToken = resp.access_token;
      localStorage.setItem('onemore_drive_token', driveToken);
      await syncFromDrive();
      document.getElementById('signinGate').classList.add('hidden');
      document.getElementById('mainApp').style.display = '';
      setSyncStatus('ok', 'synced');
      render(); renderClarity();
    }
  });
  client.requestAccessToken({ prompt: 'consent' });
}

function signOut() {
  if (driveToken) google.accounts.oauth2.revoke(driveToken, () => {});
  driveToken = null; driveFileId = null;
  localStorage.removeItem('onemore_drive_token');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('signinGate').classList.remove('hidden');
}
